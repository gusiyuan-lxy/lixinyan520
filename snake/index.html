<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇修复版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }
        #gameCanvas {
            border: 2px solid #333;
            background: #fff;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <div>分数: <span id="score">0</span></div>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏参数
        const gridSize = 20;
        let snake = [];
        let food = {};
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let gameInterval;

        // 初始化游戏
        function initGame() {
            snake = [
                {x: 200, y: 200},
                {x: 180, y: 200},
                {x: 160, y: 200}
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            generateFood();
        }

        // 生成食物（确保不与蛇身重叠）
        function generateFood() {
            const maxX = Math.floor(canvas.width / gridSize) - 1;
            const maxY = Math.floor(canvas.height / gridSize) - 1;
            
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * maxX) * gridSize,
                    y: Math.floor(Math.random() * maxY) * gridSize
                };
            } while (
                snake.some(segment => 
                    segment.x === newFood.x && 
                    segment.y === newFood.y
                )
            );
            food = newFood;
        }

        // 检测食物碰撞（中心点距离检测）
        function checkFoodCollision(head) {
            const headCenterX = head.x + gridSize/2;
            const headCenterY = head.y + gridSize/2;
            const foodCenterX = food.x + gridSize/2;
            const foodCenterY = food.y + gridSize/2;
            
            return (
                Math.abs(headCenterX - foodCenterX) < gridSize && 
                Math.abs(headCenterY - foodCenterY) < gridSize
            );
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制食物
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
            
            // 绘制蛇
            ctx.fillStyle = 'green';
            snake.forEach(segment => {
                ctx.fillRect(segment.x, segment.y, gridSize, gridSize);
            });
        }

        // 更新游戏状态
        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 碰撞检测
            if (
                head.x < 0 || head.x >= canvas.width ||
                head.y < 0 || head.y >= canvas.height ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                clearInterval(gameInterval);
                alert('游戏结束！得分: ' + score);
                return;
            }
            
            snake.unshift(head);
            
            // 吃食物检测
            if (checkFoodCollision(head)) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': if (dy !== gridSize) { dx = 0; dy = -gridSize; } break;
                case 'ArrowDown': if (dy !== -gridSize) { dx = 0; dy = gridSize; } break;
                case 'ArrowLeft': if (dx !== gridSize) { dx = -gridSize; dy = 0; } break;
                case 'ArrowRight': if (dx !== -gridSize) { dx = gridSize; dy = 0; } break;
            }
        });

        // 重新开始游戏
        restartBtn.addEventListener('click', () => {
            clearInterval(gameInterval);
            initGame();
            gameInterval = setInterval(gameLoop, 150);
        });

        // 启动游戏
        initGame();
        gameInterval = setInterval(gameLoop, 150);
    </script>
</body>
</html>
