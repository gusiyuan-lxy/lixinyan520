<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏</title>
    <style>
        /* 内联 CSS 避免路径问题 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #ff6b9a;
            margin-bottom: 10px;
        }
        .score {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #333;
        }
        #gameCanvas {
            background-color: #000;
            display: block;
            margin: 0 auto;
            border: 2px solid #ff6b9a;
        }
        .controls {
            margin-top: 15px;
        }
        button {
            background-color: #ff6b9a;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #ff4785;
        }
        .mobile-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }
        .arrow-btn {
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
        }
        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>贪吃蛇</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <div class="mobile-controls">
                <button class="arrow-btn" id="upBtn">↑</button>
                <div>
                    <button class="arrow-btn" id="leftBtn">←</button>
                    <button class="arrow-btn" id="rightBtn">→</button>
                </div>
                <button class="arrow-btn" id="downBtn">↓</button>
            </div>
        </div>
        <div id="gameOver" class="hidden">
            <h2>恭喜通过，老婆最棒！</h2>
            <button id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 内联 JavaScript 避免路径问题
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreElement = document.getElementById('score');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');
            const gameOverDiv = document.getElementById('gameOver');
            const upBtn = document.getElementById('upBtn');
            const downBtn = document.getElementById('downBtn');
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');

            // 游戏参数
            const gridSize = 20;
            let snake = [{ x: 150, y: 150 }];
            let food = { x: 0, y: 0 };
            let dx = gridSize;
            let dy = 0;
            let score = 0;
            let gameInterval;
            let isGameRunning = false;

            // 生成食物
            function generateFood() {
                food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            }

            // 绘制游戏
            function draw() {
                // 清空画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 绘制食物
                ctx.fillStyle = 'red';
                ctx.fillRect(food.x, food.y, gridSize, gridSize);

                // 绘制蛇
                ctx.fillStyle = 'green';
                snake.forEach(segment => {
                    ctx.fillRect(segment.x, segment.y, gridSize, gridSize);
                });
            }

            // 更新游戏状态
            function update() {
                const head = { x: snake[0].x + dx, y: snake[0].y + dy };

                // 检查碰撞
                if (
                    head.x < 0 || head.x >= canvas.width ||
                    head.y < 0 || head.y >= canvas.height ||
                    snake.some(segment => segment.x === head.x && segment.y === head.y)
                ) {
                    endGame();
                    return;
                }

                // 移动蛇
                snake.unshift(head);

                // 检查是否吃到食物
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreElement.textContent = score;
                    generateFood();
                } else {
                    snake.pop();
                }
            }

            // 游戏循环
            function gameLoop() {
                update();
                draw();
            }

            // 开始游戏
            function startGame() {
                if (isGameRunning) return;
                
                snake = [{ x: 150, y: 150 }];
                dx = gridSize;
                dy = 0;
                score = 0;
                scoreElement.textContent = score;
                generateFood();
                isGameRunning = true;
                gameOverDiv.classList.add('hidden');
                gameInterval = setInterval(gameLoop, 200);
            }

            // 结束游戏
            function endGame() {
                clearInterval(gameInterval);
                isGameRunning = false;
                gameOverDiv.classList.remove('hidden');
            }

            // 事件监听
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);

            // 键盘控制
            document.addEventListener('keydown', e => {
                if (!isGameRunning) return;

                if (e.key === 'ArrowUp' && dy !== gridSize) {
                    dx = 0;
                    dy = -gridSize;
                } else if (e.key === 'ArrowDown' && dy !== -gridSize) {
                    dx = 0;
                    dy = gridSize;
                } else if (e.key === 'ArrowLeft' && dx !== gridSize) {
                    dx = -gridSize;
                    dy = 0;
                } else if (e.key === 'ArrowRight' && dx !== -gridSize) {
                    dx = gridSize;
                    dy = 0;
                }
            });

            // 移动端按钮控制
            upBtn.addEventListener('click', () => { if (dy !== gridSize) { dx = 0; dy = -gridSize; } });
            downBtn.addEventListener('click', () => { if (dy !== -gridSize) { dx = 0; dy = gridSize; } });
            leftBtn.addEventListener('click', () => { if (dx !== gridSize) { dx = -gridSize; dy = 0; } });
            rightBtn.addEventListener('click', () => { if (dx !== -gridSize) { dx = gridSize; dy = 0; } });
        });
    </script>
</body>
</html>
