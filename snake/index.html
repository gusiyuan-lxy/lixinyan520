<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇完整版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f0f0;
            flex-direction: column;
        }
        #gameCanvas {
            border: 2px solid #333;
            background: #fff;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        #mobileControls {
            display: none;
            margin-top: 20px;
        }
        .arrow-row {
            display: flex;
            justify-content: center;
        }
        .arrow-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            margin: 5px;
            background-color: #2196F3;
        }
        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        #gameOver h2 {
            color: #FFD700;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            #mobileControls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <div>分数: <span id="score">0</span></div>
            <button id="startBtn">开始游戏</button>
            <button id="restartBtn" style="display:none;">重新开始</button>
        </div>
        <div id="mobileControls">
            <div class="arrow-row">
                <button class="arrow-btn" id="upBtn">↑</button>
            </div>
            <div class="arrow-row">
                <button class="arrow-btn" id="leftBtn">←</button>
                <button class="arrow-btn" id="rightBtn">→</button>
            </div>
            <div class="arrow-row">
                <button class="arrow-btn" id="downBtn">↓</button>
            </div>
        </div>
    </div>

    <div id="gameOver">
        <h2 id="gameOverText">游戏结束！</h2>
        <button id="playAgainBtn">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const gameOverDiv = document.getElementById('gameOver');
        const gameOverText = document.getElementById('gameOverText');
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // 游戏参数
        const gridSize = 20;
        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let isGameRunning = false;
        const WIN_SCORE = 150;

        // 初始化游戏（仅重置数据，不开始游戏）
        function initGame() {
            snake = [
                {x: 200, y: 200},
                {x: 180, y: 200},
                {x: 160, y: 200}
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            generateFood();
            draw(); // 只绘制初始状态
        }

        // 生成食物
        function generateFood() {
            const maxX = Math.floor(canvas.width / gridSize) - 1;
            const maxY = Math.floor(canvas.height / gridSize) - 1;
            
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * maxX) * gridSize,
                    y: Math.floor(Math.random() * maxY) * gridSize
                };
            } while (
                snake.some(segment => 
                    segment.x === newFood.x && 
                    segment.y === newFood.y
                )
            );
            food = newFood;
        }

        // 检测食物碰撞
        function checkFoodCollision(head) {
            const headCenterX = head.x + gridSize/2;
            const headCenterY = head.y + gridSize/2;
            const foodCenterX = food.x + gridSize/2;
            const foodCenterY = food.y + gridSize/2;
            
            return (
                Math.abs(headCenterX - foodCenterX) < gridSize && 
                Math.abs(headCenterY - foodCenterY) < gridSize
            );
        }

        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制食物
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
            
            // 绘制蛇
            ctx.fillStyle = 'green';
            snake.forEach((segment, index) => {
                ctx.fillRect(segment.x, segment.y, gridSize, gridSize);
                if (index === 0) {
                    ctx.fillStyle = '#2E7D32';
                    ctx.beginPath();
                    ctx.arc(segment.x + gridSize/2, segment.y + gridSize/2, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'green';
                }
            });
        }

        // 游戏结束
        function endGame(isWin = false) {
            clearInterval(gameInterval);
            isGameRunning = false;
            restartBtn.style.display = 'none';
            startBtn.style.display = 'block';
            gameOverDiv.style.display = 'flex';
            gameOverText.textContent = isWin ? 
                '恭喜通关！获得150分！' : '游戏结束！得分: ' + score;
        }

        // 更新游戏状态
        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 碰撞检测
            if (
                head.x < 0 || head.x >= canvas.width ||
                head.y < 0 || head.y >= canvas.height ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                endGame(false);
                return;
            }
            
            snake.unshift(head);
            
            // 吃食物检测
            if (checkFoodCollision(head)) {
                score += 10;
                scoreElement.textContent = score;
                
                if (score >= WIN_SCORE) {
                    endGame(true);
                    return;
                }
                
                generateFood();
            } else {
                snake.pop();
            }
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning) return;
            initGame();
            isGameRunning = true;
            gameOverDiv.style.display = 'none';
            startBtn.style.display = 'none';
            restartBtn.style.display = 'block';
            gameInterval = setInterval(gameLoop, 150);
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            if (!isGameRunning) return;
            switch(e.key) {
                case 'ArrowUp': if (dy !== gridSize) { dx = 0; dy = -gridSize; } break;
                case 'ArrowDown': if (dy !== -gridSize) { dx = 0; dy = gridSize; } break;
                case 'ArrowLeft': if (dx !== gridSize) { dx = -gridSize; dy = 0; } break;
                case 'ArrowRight': if (dx !== -gridSize) { dx = gridSize; dy = 0; } break;
            }
        });

        // 移动端控制
        upBtn.addEventListener('click', () => { if (isGameRunning && dy !== gridSize) { dx = 0; dy = -gridSize; } });
        downBtn.addEventListener('click', () => { if (isGameRunning && dy !== -gridSize) { dx = 0; dy = gridSize; } });
        leftBtn.addEventListener('click', () => { if (isGameRunning && dx !== gridSize) { dx = -gridSize; dy = 0; } });
        rightBtn.addEventListener('click', () => { if (isGameRunning && dx !== -gridSize) { dx = gridSize; dy = 0; } });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            clearInterval(gameInterval);
            startGame();
        });
        playAgainBtn.addEventListener('click', () => {
            gameOverDiv.style.display = 'none';
            startGame();
        });

        // 初始状态
        initGame();
        isGameRunning = false; // 确保初始状态为未开始
    </script>
</body>
</html>
